# Coturn TURN/STUN server for WebRTC NAT traversal
# ──────────────────────────────────────────────
# Network
# ──────────────────────────────────────────────
listening-port=3478
tls-listening-port=5349
min-port=49152
max-port=65535
listening-ip=0.0.0.0
external-ip=3.212.223.210/10.0.1.203
# ──────────────────────────────────────────────
# Authentication
# ──────────────────────────────────────────────
use-auth-secret
static-auth-secret=5d569774409d0c749d21c7d6baa213c68ac6ae589a7b2ed836b753c5c309dd8b
realm=cronosvtt.com
# ──────────────────────────────────────────────
# Security
# ──────────────────────────────────────────────
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
fingerprint
# ──────────────────────────────────────────────
# Performance
# ──────────────────────────────────────────────
user-quota=10
total-quota=200
# ──────────────────────────────────────────────
# Logging
# ──────────────────────────────────────────────
log-binding
