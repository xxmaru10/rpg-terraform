# docker/nginx/nginx.conf
# Reverse proxy for NestJS backend
# Handles HTTP -> HTTPS redirect when domain is configured
# WebSocket upgrade for real-time connections

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # File upload size (maps, PDFs can be large)
    client_max_body_size 50M;

    # ────────────────────────────────────────────
    # Upstream: NestJS backend
    # ────────────────────────────────────────────
    upstream nestjs_backend {
        server backend:3000;
        keepalive 32;
    }

    # ────────────────────────────────────────────
    # HTTP — redirect to HTTPS (once domain is set up)
    # During free tier without domain, serves HTTP only
    # ────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt challenge (for when you add a domain)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # API routes
        location /api/ {
            proxy_pass http://nestjs_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # WebSocket upgrade for real-time (Socket.IO / WS)
        location /ws/ {
            proxy_pass http://nestjs_backend/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;  # Long timeout for game sessions
            proxy_send_timeout 3600s;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://nestjs_backend/health;
            access_log off;
        }

        # Default: return 404 for non-API routes (frontend is on Vercel)
        location / {
            return 404 '{"error": "Frontend served from Vercel"}';
            add_header Content-Type application/json;
        }
    }

    # ────────────────────────────────────────────
    # HTTPS (uncomment once you have a domain + cert)
    # ────────────────────────────────────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache shared:SSL:10m;
    #
    #     # Same location blocks as HTTP server above
    # }
}
