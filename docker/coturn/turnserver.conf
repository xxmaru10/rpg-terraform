# docker/coturn/turnserver.conf
# Coturn TURN/STUN server for WebRTC NAT traversal
# Handles screen share + voice/video for ALL network types including symmetric NAT

# ──────────────────────────────────────────────
# Network
# ──────────────────────────────────────────────
# Listening ports
listening-port=3478
tls-listening-port=5349

# TURN relay port range (must match Security Group in Terraform)
min-port=49152
max-port=65535

# ──────────────────────────────────────────────
# Authentication
# Use time-limited credentials (more secure than static)
# NestJS backend generates tokens using this secret
# ──────────────────────────────────────────────
use-auth-secret
static-auth-secret=${TURN_SECRET}

realm=${TURN_REALM}

# ──────────────────────────────────────────────
# Security
# ──────────────────────────────────────────────
# Don't allow peers to connect to loopback or private IPs
no-loopback-peers
no-multicast-peers

# Deny relay to RFC 1918 private IPs (prevents SSRF via TURN)
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=172.16.0.0-172.31.255.255

# Require authentication — no anonymous relay
fingerprint

# ──────────────────────────────────────────────
# Performance (tuned for t2.micro, <100 users)
# ──────────────────────────────────────────────
# Max allocations per user (prevents abuse)
user-quota=10

# Total relay sessions
total-quota=200

# ──────────────────────────────────────────────
# Logging
# ──────────────────────────────────────────────
log-file=/var/log/coturn/turnserver.log
log-binding

# Verbose off in production (save CPU on t2.micro)
# verbose
