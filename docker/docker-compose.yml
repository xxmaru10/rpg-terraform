# docker/docker-compose.yml
# Full stack running on a single EC2 instance
# Uploaded to S3 and pulled by EC2 user_data on first boot
# Update via: ./scripts/deploy.sh

version: "3.9"

networks:
  rpg-internal:
    driver: bridge

volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/postgres

services:

  # ────────────────────────────────────────────
  # PostgreSQL 16 — replaces Supabase
  # Data persists on EBS at /data/postgres
  # ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - rpg-internal
    # NOT exposed to host — only accessible inside Docker network
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Tuned for t2.micro (1GB RAM) — Supabase IO issues were partly from
    # excessive connections; this limits and pools properly
    command: >
      postgres
        -c max_connections=50
        -c shared_buffers=128MB
        -c effective_cache_size=512MB
        -c maintenance_work_mem=32MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=4MB
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=2MB
        -c min_wal_size=80MB
        -c max_wal_size=1GB

  # ────────────────────────────────────────────
  # NestJS Backend API
  # ────────────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-your-ecr-repo/rpg-backend:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET: ${S3_BUCKET}
      PORT: ${NEST_API_PORT:-3000}
    networks:
      - rpg-internal
    expose:
      - "${NEST_API_PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${NEST_API_PORT:-3000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ────────────────────────────────────────────
  # Coturn — STUN/TURN server for WebRTC
  # Required for screen share + voice/video across NAT
  # ────────────────────────────────────────────
  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host  # Must use host network for TURN relay to work
    volumes:
      - /opt/rpg-platform/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - /data/coturn-logs:/var/log/coturn
    command: -c /etc/coturn/turnserver.conf

  # ────────────────────────────────────────────
  # Nginx — reverse proxy + SSL termination
  # ────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/rpg-platform/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - rpg-internal
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
